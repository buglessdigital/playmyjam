<!doctype html>
<html lang="tr">
  <head>

    <title>Çevrimdışı — PlayMyJam</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #0f0a18;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 24px;

      img { width: 96px; height: 96px; border-radius: 22px; }

        margin-top: 8px;

        border: none;
        border-radius: 9999px;
        background: linear-gradient(135deg, #a78bfa, #f472b6);
        color: #0f0a18;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
      }

    <img src="/icon-192.png" alt="PlayMyJam" />
    <h1>İnternet bağlantısı yok</h1>
